name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  # 构建并发布 Rust 二进制文件
  release-rust:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64-unknown-linux-gnu, x86_64-pc-windows-gnu, aarch64-unknown-linux-gnu]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        target: ${{ matrix.target }}
    
    - name: Build release binary
      run: cargo build --release --target ${{ matrix.target }} --bin nrcs-node
    
    - name: Package binary
      run: |
        BIN_NAME="nrcs-node"
        TARGET_DIR="target/${{ matrix.target }}/release"
        
        if [[ "${{ matrix.target }}" == "x86_64-pc-windows-gnu" ]]; then
          EXT=".exe"
        else
          EXT=""
        fi
        
        cp $TARGET_DIR/$BIN_NAME ./$BIN_NAME$EXT
        tar -czf $BIN_NAME-${{ matrix.target }}.tar.gz $BIN_NAME$EXT config/
      
    - name: Upload release asset
      uses: softprops/action-gh-release@v1
      with:
        files: nrcs-node-*.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 构建并发布 Docker 镜像
  release-docker:
    runs-on: ubuntu-latest
    needs: release-rust
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v4
      with:
        images: ghcr.io/${{ github.repository }}
        tags: |
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=sha,prefix={{branch}}-
    
    - name: Build and push backend
      uses: docker/build-push-action@v4
      with:
        context: .
        file: docker/backend.Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=registry,ref=ghcr.io/${{ github.repository }}:buildcache
        cache-to: type=registry,ref=ghcr.io/${{ github.repository }}:buildcache,mode=max
    
    - name: Build and push frontend
      uses: docker/build-push-action@v4
      with:
        context: .
        file: docker/frontend.Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}-frontend
        labels: ${{ steps.meta.outputs.labels }}
        build-args: |
          VITE_API_BASE_URL=${{ vars.API_URL }}
          VITE_WS_URL=${{ vars.WS_URL }}
        cache-from: type=registry,ref=ghcr.io/${{ github.repository }}:frontend-buildcache
        cache-to: type=registry,ref=ghcr.io/${{ github.repository }}:frontend-buildcache,mode=max
    
    - name: Generate release notes
      run: |
        echo "# Release ${{ github.ref_name }}" > release_notes.md
        
        echo "## 📦 What's Changed" >> release_notes.md
        echo "- Automated build from tag ${{ github.ref_name }}" >> release_notes.md
        echo "- All tests passing" >> release_notes.md
        echo "- Security scans clean" >> release_notes.md
        
        echo "## 🚀 Quick Start" >> release_notes.md
        echo "\`\`\`bash" >> release_notes.md
        echo "docker-compose -f docker/docker-compose.yml up -d" >> release_notes.md
        echo "\`\`\`" >> release_notes.md
        
        echo "## 📦 Assets" >> release_notes.md
        echo "- \`nrcs-node-*.tar.gz\`: Pre-built binaries" >> release_notes.md
        echo "- Docker images: \`ghcr.io/${{ github.repository }}:${{ github.ref_name }}\`" >> release_notes.md
        
        echo "## 🔗 Links" >> release_notes.md
        echo "- [Documentation](https://docs.nrcs.blockchain)" >> release_notes.md
        echo "- [API Reference](https://api.nrcs.blockchain)" >> release_notes.md
        
    - name: Attach release notes
      run: gh release edit ${{ github.ref }} --notes-file release_notes.md
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 更新 Helm chart
  release-helm:
    if: contains(github.ref, 'tags/v')
    runs-on: ubuntu-latest
    needs: [release-rust, release-docker]
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Configure Git
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
    
    - name: Update Helm chart version
      run: |
        TAG="${GITHUB_REF#refs/tags/}"
        sed -i "s/^version:.*/version: $TAG/" helm/nrcs-node/Chart.yaml
        sed -i "s|^appVersion:.*|appVersion: \"$TAG\"|" helm/nrcs-node/Chart.yaml
      
    - name: Commit Helm update
      run: |
        git add helm/nrcs-node/Chart.yaml
        git commit -m "chore(helm): update version to ${GITHUB_REF#refs/tags/}" || echo "No changes to commit"
        git push