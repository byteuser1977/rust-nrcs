name: CI

on:
  pull_request:
    branches: [ "develop", "main" ]
  push:
    branches: [ "develop", "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy linter
        run: cargo clippy --workspace --all-targets --exclude orm -- -D warnings

      - name: Build (debug)
        run: cargo build --workspace --exclude orm

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: check
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Run unit tests
        run: cargo test --workspace --exclude orm --verbose

      - name: Run doctests
        run: cargo test --workspace --doc --exclude orm

      - name: Generate code coverage (optional)
        if: ${{ always() }}
        run: |
          cargo install cargo-tarpaulin --quiet || echo "tarpaulin install failed - continuing"
          cargo tarpaulin --out Xml --output-dir coverage/ || echo "coverage failed - continuing"

      - name: Upload coverage to Codecov (optional)
        if: ${{ always() }}
        uses: codecov/codecov-action@v4
        with:
          file: coverage/cobertura.xml
          fail_ci_if_error: false

  windows-test:
    name: Windows Test (MSVC)
    runs-on: windows-latest
    needs: check
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain (MSVC)
        run: |
          rustup toolchain install stable-x86_64-pc-windows-msvc
          rustup default stable-x86_64-pc-windows-msvc

      - name: Build (MSVC)
        run: cargo build --workspace --exclude orm

      - name: Run unit tests
        run: cargo test --workspace --exclude orm

  audit:
    name: Audit dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-audit
        run: cargo install cargo-audit --quiet

      - name: Run audit
        run: cargo audit
